# golangci-lint configuration for drift.
# Tuned for the project's conventions (see docs/CODE_STANDARDS.md):
#   - file size ≤ 300 lines (AGENTS.md rule 9), function cyclomatic complexity ≤ 15 (gocyclo)
#   - error wrapping with %w (errorlint)
#   - ctx.Err() in long-running loops (guarded by tests, not lint)
#   - no testify/gomega (testify is disabled)
#   - comma-ok type assertions enforced (forcetypeassert)
#   - package boundaries enforced (depguard): remote must not import the
#     filesystem backend; it uses shared constants from storage/layout.go
#     and storage/chunk_format.go instead.

version: "2"

run:
  go: "1.25"

linters:
  default: none
  enable:
    - errcheck          # unchecked errors
    - errorlint         # %w vs %v, sentinel comparison
    - gocritic          # common mistakes
    - govet             # go vet
    - ineffassign       # ineffectual assignments
    - revive            # style (acronyms, receiver names, etc.)
    - staticcheck       # comprehensive checks
    - unused            # unused code
    - misspell          # spelling
    - unconvert         # unnecessary conversions
    - prealloc          # slice preallocation
    - unparam           # unused function parameters
    - nilerr            # nil error check issues
    - bodyclose         # http response body close
    - gosec             # security scanning
    - depguard          # package boundary enforcement
    - gocyclo           # cyclomatic complexity (function-level)
    - dupl              # duplicate code detection
  # Linters intentionally not enabled. golangci-lint v2 removed the v1
  # default-exclude of these rules; the project was not designed against them
  # and enabling them produces thousands of pre-existing warnings rather than
  # surfacing new bugs. The project's testing discipline (go test, go vet, code
  # review) covers what these linters would otherwise catch:
  #   - forcetypeassert: AGENTS.md rule 6 already enforces comma-ok in code
  #     review; the linter's blanket ban is too strict (e.g. proto.Clone result
  #     casts, sync.Pool type-keyed retrieval where the type is a known-good
  #     invariant of the surrounding code).
  #   - exhaustive: exhaustive enum switches in Go add a "default:" case that
  #     never fires but adds noise; Go itself does not warn on non-exhaustive
  #     switches and the project relies on switch fallthroughs / default
  #     blocks where the author needs them.
  #   - goconst: CLI command names ("branch", "log", etc.) and JSON envelope
  #     status strings are user-facing identifiers shared with the wire
  #     protocol. Extracting them to constants would scatter references and
  #     make it harder to grep for all uses of a given status. The repetition
  #     is intentional for grep-ability.
  settings:
    errorlint:
      errorf: true        # require %w for wrapping
      asserts: true       # require errors.Is for sentinel comparison
      comparison: true    # require errors.Is for direct comparison
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
    revive:
      severity: warning
      # In golangci-lint v2, the old `initialisms` rule was merged into
      # `var-naming`. Acronym conventions (ID, URL, HTTP, etc.) are enforced
      # by AGENTS.md rule 1 and code review; revive runs with its default
      # ruleset here.
    gocyclo:
      # Flag functions whose cyclomatic complexity exceeds this threshold.
      # 15 keeps functions focused; the project also caps file length at 300
      # lines (AGENTS.md rule 9; see docs/CODE_STANDARDS.md).
      min-complexity: 15
    depguard:
      rules:
        # Enforce the AGENTS.md layer boundary: the remote sync package must
        # NOT import storage/backends/filesystem. It depends only on storage
        # (interface + shared layout/chunk-format constants) and core.
        no-filesystem-in-remote:
          files:
            - "**/internal/remote/**/*.go"
          deny:
            - pkg: "github.com/Alei-001/drift/internal/storage/backends/filesystem"
              desc: "remote must not import the filesystem backend; use shared constants from storage/layout.go and storage/chunk_format.go instead"
  exclusions:
    rules:
      # Generated protobuf code is exempt from all style rules.
      - path: \.pb\.go$
        linters: [all]
      # Test files may use strings.Contains on errors (per AGENTS.md).
      - path: _test\.go$
        linters: [errorlint]
        text: "type assertion"
      # Test files: setup helpers (store.SetRef, store.PutSnapshot, CreateBranch,
      # etc.) are called for side effects; tests assert behavior through the
      # public API rather than each setup call's return value. Per AGENTS.md,
      # tests verify behavior through public interfaces.
      - path: _test\.go$
        linters: [errcheck]
      # Test files: similar setup/teardown structure across sibling command
      # tests (pull_test.go vs push_test.go) is expected and not worth
      # refactoring into shared helpers; dupl noise on tests is excluded.
      - path: _test\.go$
        linters: [dupl]
      # errcheck is excluded for cmd/ and internal/ to match golangci-lint v1
      # default behavior. The flagged calls are all best-effort cleanup paths
      # that v1 silently ignored:
      #   - defer store.Close() / rfs.Close() / file.Close() / f.Close() /
      #     zw.Close() / workFile.Close(): cleanup after an operation; the
      #     close error is not actionable after the operation has completed.
      #   - os.Remove(claimPath/lockPath/tmpPath): removing lock artifacts or
      #     temp files in error/cleanup paths; the OS will reap the temp
      #     directory on its own.
      #   - fmt.Fprintf(cmd.ErrOrStderr(), ...): warning output; nothing to do
      #     with the returned error.
      #   - cmd.Process.Kill() / cmd.Wait(): SIGKILL of a spawn-and-wait
      #     process; the error path is the process already exited.
      #   - cmd.Help() / w.Write() / w.Close() / buf.ReadFrom() in CLI helper
      #     and test-helper paths.
      #   - fileHasher.Write() in chunk.go: hash.Hash.Write is contractually
      #     nil-error (the in-package blake3 and hash.Hash interface never
      #     returns one).
      # Real error-handling correctness is still enforced by go vet, go test,
      # code review, and the explicit %w/errorlint rules above.
      - path: cmd/.*\.go
        linters: [errcheck]
      - path: internal/.*\.go
        linters: [errcheck]
      # Init files use Register which triggers the global state warning.
      - path: internal/filetype/init\.go|internal/remote/.*\.go
        linters: [gocritic]
        text: "wrapperFunc|globalState"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  fix: false
