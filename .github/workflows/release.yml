# Release workflow: triggered by version tags (v*.*.*).
#
# Produces:
#   - Cross-platform archives (zip/tar.gz) via goreleaser
#   - Linux packages (.deb/.rpm) via goreleaser nfpm
#   - macOS packages (.pkg) via pkgbuild
#   - SHA-256 checksums file
#   - Windows graphical installer (.exe) via Inno Setup
#
# All artifacts are uploaded to the GitHub Release as drafts for review before
# publishing. The Windows installer and macOS .pkg are built in separate jobs
# because their toolchains (Inno Setup, pkgbuild) run natively on their
# respective OSes.

name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # Job 1: goreleaser produces archives, Linux packages, and checksums on
  # Linux (fast, cross-compile from a single host).
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: goreleaser-dist
          path: dist/
          retention-days: 7

  # Job 2: Inno Setup builds the Windows .exe installer. Depends on goreleaser
  # for the prebuilt drift.exe (extracted from the windows_amd64 zip).
  windows-installer:
    runs-on: windows-latest
    needs: goreleaser
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download goreleaser artifacts
        uses: actions/download-artifact@v8
        with:
          name: goreleaser-dist
          path: dist/

      - name: Extract drift.exe from windows_amd64 archive
        shell: pwsh
        run: |
          $zip = Get-ChildItem dist/drift_*_windows_amd64.zip -ErrorAction Stop | Select-Object -First 1
          $extractDir = "dist/drift_windows_amd64"
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          Expand-Archive -Path $zip.FullName -DestinationPath $extractDir -Force
          if (-not (Test-Path "$extractDir/drift.exe")) {
            throw "drift.exe not found in $extractDir"
          }

      - name: Determine version from tag
        id: version
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF -replace '^refs/tags/v',''
          echo "version=$tag" >> $env:GITHUB_OUTPUT
          echo "version_safe=$($tag -replace '\.','-')" >> $env:GITHUB_OUTPUT

      - name: Compile Inno Setup installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.8
        with:
          path: installer/drift.iss
          options: /DMyAppVersion=${{ steps.version.outputs.version }} /DMyAppVersionSafe=${{ steps.version.outputs.version_safe }} /DSourceDir=..\dist\drift_windows_amd64 /Q

      - name: Upload installer to release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: dist/drift_*_windows_amd64_setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 3: macOS .pkg installers. Uses the system-provided pkgbuild tool to
  # produce standard macOS installer packages for both Intel and Apple Silicon.
  # No signing/notarization (keeps it simple); users may need to allow the
  # package in System Settings > Privacy & Security on first launch.
  macos-installer:
    runs-on: macos-latest
    needs: goreleaser
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download goreleaser artifacts
        uses: actions/download-artifact@v8
        with:
          name: goreleaser-dist
          path: dist/

      - name: Determine version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build .pkg installers
        run: |
          version="${{ steps.version.outputs.version }}"
          for arch in amd64 arm64; do
            tarball=$(ls dist/drift_*_darwin_${arch}.tar.gz | head -1)
            extract_dir="dist/extract_${arch}"
            pkg_root="dist/pkg_root_${arch}"
            mkdir -p "$extract_dir" "$pkg_root"
            tar xzf "$tarball" -C "$extract_dir"
            bin=$(find "$extract_dir" -name drift -type f | head -1)
            if [ -z "$bin" ]; then
              echo "drift binary not found in $tarball"
              exit 1
            fi
            cp "$bin" "$pkg_root/drift"
            chmod +x "$pkg_root/drift"
            pkgbuild \
              --root "$pkg_root" \
              --identifier com.github.alei-001.drift \
              --version "$version" \
              --install-location /usr/local/bin \
              "dist/drift_${version}_darwin_${arch}.pkg"
            rm -rf "$extract_dir" "$pkg_root"
          done

      - name: Upload .pkg to release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: dist/drift_*_darwin_*.pkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
