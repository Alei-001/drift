name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Extract version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          "DRIFT_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build drift.exe
        shell: pwsh
        run: |
          go build `
            -ldflags "-X github.com/drift/drift/internal/cli.version=$env:DRIFT_VERSION -s -w" `
            -o dist/drift.exe `
            ./cmd/drift/
          Write-Host "Built drift.exe v$env:DRIFT_VERSION"

      - name: Verify version
        shell: pwsh
        run: ./dist/drift.exe version

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Refresh PATH
        shell: pwsh
        run: $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")

      - name: Build installer
        shell: pwsh
        run: |
          Copy-Item dist/drift.exe installer/drift.exe
          iscc /DDriftVersion=$env:DRIFT_VERSION installer/drift.iss
          $setup = Get-ChildItem installer/drift-setup-*.exe | Select-Object -First 1
          Move-Item $setup dist/
          Write-Host "Built $($setup.Name)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: drift-windows-v${{ env.DRIFT_VERSION }}
          path: |
            dist/drift.exe
            dist/drift-setup-*.exe

      - name: Extract release notes from changelog
        shell: pwsh
        run: |
          $changelog = Get-Content docs/CHANGELOG.md -Raw
          # Extract from "## v$env:DRIFT_VERSION" to the end of the file.
          $pattern = "## v$($env:DRIFT_VERSION) .*"
          if ($changelog -match "(?s)($pattern.*)`$") {
            $notes = $matches[1]
          } else {
            $notes = "Drift v$env:DRIFT_VERSION"
          }
          $notes | Out-File -FilePath release-notes.md -Encoding UTF8
          Write-Host "Release notes: $($notes.Length) chars"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Drift v${{ env.DRIFT_VERSION }}
          body_path: release-notes.md
          files: |
            dist/drift.exe
            dist/drift-setup-*.exe
          draft: false
          prerelease: false
