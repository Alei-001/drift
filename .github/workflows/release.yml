# Release workflow: triggered by version tags (v*.*.*).
#
# Produces:
#   - Cross-platform archives (zip/tar.gz) via goreleaser
#   - SHA-256 checksums file (goreleaser, covers archives)
#   - Per-artifact .sha256 sidecar files (covers installer)
#   - Windows graphical installer (.exe) via Inno Setup
#
# All artifacts are uploaded to the GitHub Release as drafts for review before
# publishing. The Windows installer is built in a separate job because Inno
# Setup runs natively on Windows. Each installer ships with a .sha256 sidecar
# so users can verify integrity without consulting the aggregate checksums
# file. Linux/macOS users use the tar.gz archives directly.

name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # Job 1: goreleaser produces archives and checksums on Linux
  # (fast, cross-compile from a single host).
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: goreleaser-dist
          path: dist/
          retention-days: 7

  # Job 2: Inno Setup builds the Windows .exe installer. Depends on goreleaser
  # for the prebuilt drift.exe (extracted from the windows_amd64 zip).
  windows-installer:
    runs-on: windows-latest
    needs: goreleaser
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download goreleaser artifacts
        uses: actions/download-artifact@v8
        with:
          name: goreleaser-dist
          path: dist/

      - name: Extract drift.exe from windows_amd64 archive
        shell: pwsh
        run: |
          $zip = Get-ChildItem dist/drift_*_windows_amd64.zip -ErrorAction Stop | Select-Object -First 1
          $extractDir = "dist/drift_windows_amd64"
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          Expand-Archive -Path $zip.FullName -DestinationPath $extractDir -Force
          if (-not (Test-Path "$extractDir/drift.exe")) {
            throw "drift.exe not found in $extractDir"
          }

      - name: Determine version from tag
        id: version
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF -replace '^refs/tags/v',''
          echo "version=$tag" >> $env:GITHUB_OUTPUT
          $parts = $tag.Split('.')
          while ($parts.Count -lt 4) { $parts += '0' }
          $full = $parts -join '.'
          echo "version_full=$full" >> $env:GITHUB_OUTPUT

      - name: Set numeric version in Inno Setup script
        shell: pwsh
        run: |
          $numeric = "${{ steps.version.outputs.version_full }}"
          $content = Get-Content installer/drift.iss -Raw
          $content = $content -replace '#define MyAppVersionFull\s+"[^"]+"', "#define MyAppVersionFull `"$numeric`""
          Set-Content installer/drift.iss -Value $content
          Write-Host "Set MyAppVersionFull = $numeric"

      - name: Compile Inno Setup installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.8
        with:
          path: installer/drift.iss
          options: /DMyAppVersion=${{ steps.version.outputs.version }} /DSourceDir=..\dist\drift_windows_amd64 /Q

      - name: Rename installer to include version
        shell: pwsh
        run: |
          $src = "dist/drift_windows_setup.exe"
          $dst = "dist/drift_${{ steps.version.outputs.version }}_windows_amd64_setup.exe"
          Move-Item $src $dst -Force
          Write-Host "Renamed: $src -> $dst"

      - name: Generate installer .sha256 sidecar
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist/drift_*_windows_amd64_setup.exe | Select-Object -First 1
          $hash = (Get-FileHash $exe.FullName -Algorithm SHA256).Hash.ToLower()
          $sidecar = "$($exe.FullName).sha256"
          "$hash  $($exe.Name)" | Out-File -NoNewline -Encoding ASCII $sidecar
          Write-Host "Created: $sidecar"

      - name: Upload installer and checksum to release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: |
            dist/drift_*_windows_amd64_setup.exe
            dist/drift_*_windows_amd64_setup.exe.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
