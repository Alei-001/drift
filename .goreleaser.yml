# GoReleaser configuration for drift.
# Docs: https://goreleaser.com
#
# Release flow: push a tag (v0.1.0) -> GitHub Actions runs `goreleaser release`
# -> produces archives + Linux packages + checksums -> uploads to the GitHub
# Release. Windows setup.exe is built separately by Inno Setup in the workflow.
#
# Archive naming convention (must match internal/version/matchAsset):
#   drift_<version>_<os>_<arch>.{zip|tar.gz}
# Checksums file (must match internal/version/findChecksumAsset):
#   drift_<version>_checksums.txt

version: 2

project_name: drift

# No before-hooks: `go mod tidy` was removed because the release build should
# not mutate go.sum. The repo is expected to be tidy (CI enforces this via
# `go build`/`go vet`); running tidy during release risks network-dependent
# failures and non-reproducible archives.

builds:
  - id: drift
    main: ./cmd/drift
    binary: drift
    # Strip debug info and inject version metadata. The three ldflags variables
    # are read by internal/version.GetInfo().
    ldflags:
      - -s -w
      - -X github.com/Alei-001/drift/internal/version.Version={{.Version}}
      - -X github.com/Alei-001/drift/internal/version.Commit={{.ShortCommit}}
      - -X github.com/Alei-001/drift/internal/version.BuildDate={{.Date}}
    env:
      - CGO_ENABLED=0
    targets:
      - windows_amd64
      - windows_arm64
      - linux_amd64
      - linux_arm64
      - darwin_amd64
      - darwin_arm64

archives:
  - id: default
    # Default name template produces drift_<version>_<os>_<arch>, which matches
    # the suffix-matching logic in internal/version/release.go matchAsset().
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    # Windows archives as zip (matchAsset expects .zip for windows), everything
    # else as tar.gz.
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    # Additional files packaged alongside the binary.
    files:
      - LICENSE*
      - README*.md

nfpms:
  - id: drift
    # Linux distribution packages only (deb + rpm). Windows/macOS users get
    # archives or the Inno Setup .exe.
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    homepage: https://github.com/Alei-001/drift
    maintainer: drift <Alei-001@users.noreply.github.com>
    description: Content-addressed version control for creators.
    license: MIT
    formats:
      - deb
      - rpm
    # GoReleaser automatically adds the built binaries to the package. bindir
    # controls where they are installed; /usr/bin is on PATH by default.
    bindir: /usr/bin
    # Include LICENSE and README in /usr/share/doc/drift/, consistent with the
    # Windows installer and macOS .pkg which also ship these files.
    contents:
      - src: LICENSE
        dst: /usr/share/doc/drift/LICENSE
      - src: README.md
        dst: /usr/share/doc/drift/README.md
      - src: README.zh-CN.md
        dst: /usr/share/doc/drift/README.zh-CN.md

checksum:
  # Suffix `_checksums.txt` is matched by internal/version/findChecksumAsset.
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

# SBOM (Software Bill of Materials) for each archive, generated via syft in
# CycloneDX format. Consumers and compliance tooling can inspect the full
# dependency tree of every release artifact. syft must be on PATH; the CI
# goreleaser-check job installs it before the snapshot dry-run.
#
# Note on signing: artifact/checksum signing is intentionally omitted here.
# GoReleaser's `signs:` block requires a signing key/cert available in the
# release workflow (e.g. GPG_FINGERPRINT or a cosign key secret). Adding it
# without those secrets would break the snapshot dry-run, so it is deferred
# until the release pipeline has a key-provisioning step.
sboms:
  - artifacts: archive

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: Alei-001
    name: drift
  draft: true
  prerelease: auto
  name_template: "{{ .Tag }}"
